version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Cooldown: hold version-update PRs so a freshly published (possibly
    # compromised) release ages in public before it reaches CI. Security
    # updates for known CVEs bypass this automatically.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/dashboard"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      dashboard-pip:
        patterns: ["*"]
  # Root dev/tooling stack (PEP 735 `dev` group in pyproject.toml + uv.lock).
  # These are local-dev/advisory-CI tools only; the required CI path stays
  # pure-stdlib, so a lag here never blocks a merge.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      root-dev:
        patterns: ["*"]
