version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/dashboard"
    schedule:
      interval: "monthly"
    groups:
      dashboard-pip:
        patterns: ["*"]
