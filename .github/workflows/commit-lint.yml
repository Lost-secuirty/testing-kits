name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: commit-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitlint:
    name: Conventional commits (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # base_ref via env (not inline ${{ }}) to avoid template injection — zizmor.
      - name: Lint PR commit messages (conventional commits)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python -m pip install --disable-pip-version-check "gitlint-core==0.19.1"
          git fetch origin "${BASE_REF}" --depth=200
          gitlint --commits "origin/${BASE_REF}..HEAD"
