name: secret-pii-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Self-test the scanner
        run: python3 tools/scan_staged.py --self-test
      - name: Scan PR diff for secrets / personal-tier paths
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 tools/scan_staged.py --ci --base "origin/${BASE_REF}"
