name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Compile-check
        run: python -m compileall -q harnesses tests tools
      - name: Run unittest suite
        run: make test
      - name: Generate STATUS.md
        if: always()
        run: make report || true
      - name: Upload STATUS.md
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-py${{ matrix.python }}
          path: STATUS.md
      - name: Upload STATUS.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-json-py${{ matrix.python }}
          path: STATUS.json
