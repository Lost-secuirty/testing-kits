name: test

on:
  push:
  pull_request:
  schedule:
    - cron: "13 4 * * 6"
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unittest:
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Compile-check
        run: python -m compileall -q harnesses tests tools
      - name: Run unittest suite
        run: make test
      - name: Run harness proof audit
        run: make proof
      - name: Verify generated reports
        run: python tools/generate_report.py --check
      - name: Generate STATUS.md for diagnostics
        if: always()
        run: make report || true
      - name: Upload STATUS.md
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: status-py${{ matrix.python }}
          path: STATUS.md
      - name: Upload STATUS.json
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: status-json-py${{ matrix.python }}
          path: STATUS.json

  cross-platform:
    name: cross-platform
    # Portability proof: the harness collection is pure-stdlib, so the same suite
    # and proof audit must pass on Windows and macOS. Runs the underlying Python
    # commands directly (not `make`, which Windows runners lack). Kept off the
    # `unittest` matrix so the required `unittest (3.x)` check names are unchanged.
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python: ["3.12"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Compile-check
        run: python -m compileall -q harnesses tests tools
      - name: Run unittest suite
        run: python -m unittest discover -s tests -t . -p "test_*.py"
      - name: Run harness proof audit
        run: python tools/proof_audit.py --run-selftests
      # Deliberately proof-audit only. `generate_report.py --check` runs the full
      # per-harness self-test sweep, which includes the load-sensitive `core/stress`
      # harness; that self-test flakes on shared hosted runners (observed FAIL at
      # ~34s on one windows-latest run, PASS on the same commit's other run, well
      # under the 90s timeout — an internal timing assertion, not a hang). The proof
      # audit above is the deterministic portability signal; report-generation logic
      # is OS-independent and stays covered by the Linux `unittest` matrix.

  package:
    name: Package, install, and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build and install wheel smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv .install-smoke
          .install-smoke/bin/python -m pip install --disable-pip-version-check dist/*.whl
          (cd "$(mktemp -d)" && "$GITHUB_WORKSPACE/.install-smoke/bin/python" -c "import harnesses")
      - name: Audit dashboard dependencies
        run: |
          python -m pip install --disable-pip-version-check "pip-audit==2.10.1"
          pip-audit -r dashboard/requirements.txt

  mutation-advisory:
    name: Mutation testing (advisory, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Advisory deepening of the mandatory cross-platform TEETH swap-check
    # (make teeth / make proof). Mutmut is Linux-only and NEVER blocks a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install mutmut
        run: python -m pip install --disable-pip-version-check "mutmut==3.6.0"
      - name: Run advisory mutation lane
        run: python tools/mutmut_lane.py
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutmut-report
          path: mutmut-report.txt
          if-no-files-found: ignore
