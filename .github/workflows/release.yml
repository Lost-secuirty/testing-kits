name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to create or update
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    name: Validate, attest, and release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check "ruff==0.15.17"
      - run: python -m compileall -q harnesses tests tools
      - run: ruff check harnesses tests tools
      - run: python -m unittest discover -s tests -t . -p "test_*.py"
      - run: python tools/proof_audit.py --run-selftests
      - run: python tools/generate_report.py --check
      - run: python tools/scan_staged.py --self-test
      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            --exclude=.git --exclude='**/__pycache__' \
            -czf release-artifacts/testing-kits-source.tar.gz \
            harnesses tests tools dashboard docs README.md STATUS.md STATUS.json pyproject.toml
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/sbom.spdx.json
          upload-artifact: false
      - name: Generate checksums
        run: sha256sum release-artifacts/* > release-artifacts/SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-artifacts/*
      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testing-kits-release-${{ github.sha }}
          path: release-artifacts
          if-no-files-found: error
          retention-days: 90
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --target "$GITHUB_SHA" --generate-notes --title "$RELEASE_TAG"
          fi

  pypi-publish:
    name: Publish to PyPI
    # Trusted publishing (OIDC): no API token or stored secret. Runs only after the
    # release job's validate/lint/proof gates pass, and only on an actual v* tag push.
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/testing-kits
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "${GITHUB_REF_NAME}" != "v${package_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version v${package_version}"
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install --disable-pip-version-check "build==1.2.2.post1"
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
