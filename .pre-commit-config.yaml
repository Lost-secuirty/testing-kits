minimum_pre_commit_version: "4.6.0"
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=auto]
      - id: trailing-whitespace
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: local
    hooks:
      - id: repository-control-audit
        name: repository control audit
        entry: python tools/control_audit.py
        language: system
        pass_filenames: false
        always_run: true
      - id: secret-pii-policy
        name: repository secret and PII policy
        entry: python tools/scan_staged.py --staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
